name: Auto deploy from master

on:
  push:
    branches: [master]

concurrency:
  group: deploy-master
  cancel-in-progress: false

jobs:
  deploy:
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        server:
          - dev-db-redcap
          - dev-web-redcap

    name: Sync repo to latest master (${{ matrix.server }})
    runs-on: [self-hosted, Linux, X64, dev]

    steps:
      - name: Sync repo to latest master
        run: |
          set -euo pipefail
          flock /tmp/deploy-master.lock bash -xe -c '
            cd /opt/redcap/redcap-upgrade
            git fetch origin master
            git reset --hard origin/master
            git clean -fd
          '
