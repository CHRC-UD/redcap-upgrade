name: Auto deploy from master

on:
  push:
    branches: [master]

concurrency:
  group: deploy-master
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Sync repo to latest master
        run: |
          set -euo pipefail
          flock /tmp/deploy-master.lock bash -xe -c '
            cd /opt/redcap/redcap-upgrade
            git fetch origin master
            git reset --hard origin/master
            git clean -fd
          '
